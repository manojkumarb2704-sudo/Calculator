<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#141e30,#243b55,#0f2027,#2c5364);
background-size:400% 400%;
animation:gradient 12s ease infinite;
overflow:hidden;
}

@keyframes gradient{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.calculator{

width:360px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border-radius:25px;

padding:25px;

box-shadow:0 15px 40px rgba(0,0,0,.4);

border:1px solid rgba(255,255,255,.15);

}

.display{

width:100%;

height:90px;

border:none;

outline:none;

background:rgba(255,255,255,.08);

border-radius:18px;

padding:20px;

font-size:35px;

color:white;

text-align:right;

margin-bottom:20px;

box-shadow:inset 0 0 15px rgba(255,255,255,.1);

}

.buttons{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:15px;

}

button{

height:70px;

border:none;

border-radius:18px;

font-size:22px;

cursor:pointer;

transition:.3s;

background:rgba(255,255,255,.08);

color:white;

box-shadow:0 0 15px rgba(255,255,255,.08);

}

button:hover{

transform:translateY(-5px);

background:#00e5ff;

color:#000;

box-shadow:0 0 25px cyan;

}

button:active{

transform:scale(.95);

}

.operator{

background:#ff9800;

color:white;

}

.operator:hover{

background:#ffb300;

color:black;

}

.equal{

background:#00c853;

grid-column:span 2;

}

.equal:hover{

background:#00e676;

color:black;

}

.clear{

background:#e53935;

}

.clear:hover{

background:#ff5252;

}

.delete{

background:#8e24aa;

}

.delete:hover{

background:#ba68c8;

}

.footer{

text-align:center;

margin-top:20px;

font-size:13px;

color:#ddd;

}

@media(max-width:420px){

.calculator{

width:95%;

}

button{

height:65px;

font-size:20px;

}

.display{

font-size:28px;

}

}

</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" class="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">AC</button>

<button class="delete" onclick="deleteLast()">⌫</button>

<button class="operator" onclick="append('%')">%</button>

<button class="operator" onclick="append('/')">÷</button>

<button onclick="append('7')">7</button>

<button onclick="append('8')">8</button>

<button onclick="append('9')">9</button>

<button class="operator" onclick="append('*')">×</button>

<button onclick="append('4')">4</button>

<button onclick="append('5')">5</button>

<button onclick="append('6')">6</button>

<button class="operator" onclick="append('-')">−</button>

<button onclick="append('1')">1</button>

<button onclick="append('2')">2</button>

<button onclick="append('3')">3</button>

<button class="operator" onclick="append('+')">+</button>

<button onclick="append('0')">0</button>

<button onclick="append('.')">.</button>

<button class="equal" onclick="calculate()">=</button>

</div>

<div class="footer">
Made with ❤️ using HTML, CSS & JavaScript
</div>

</div>

<script>

const display=document.getElementById("display");

function append(value){

display.value+=value;

}

function clearDisplay(){

display.value="";

}

function deleteLast(){

display.value=display.value.slice(0,-1);

}

function calculate(){

try{

if(display.value==="") return;

display.value=eval(display.value);

}

catch{

display.value="Error";

setTimeout(()=>{

display.value="";

},1200);

}

}

document.addEventListener("keydown",(e)=>{

const key=e.key;

if("0123456789+-*/.%".includes(key)){

append(key);

}

else if(key==="Enter"){

calculate();

}

else if(key==="Backspace"){

deleteLast();

}

else if(key==="Escape"){

clearDisplay();

}

});

</script>

</body>
</html>
